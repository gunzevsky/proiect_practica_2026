<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Test Formular</title>

  <style>

    :root {
      --theme-color: #1d1d1d;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;

      background: #111;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
    }

    .form-container {
      background: var(--theme-color);

      padding: 40px;

      border-radius: 16px;

      width: 400px;

      color: white;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.4);

      transition: background 0.3s ease;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label {
      font-weight: bold;
      margin-bottom: 5px;
    }

    input {
      padding: 12px;

      border: none;
      border-radius: 8px;

      font-size: 16px;
    }

    input[type="color"] {
      height: 50px;
      padding: 5px;
      cursor: pointer;
    }

    button {
      background: #d61b1b;

      color: white;

      border: none;

      padding: 14px;

      border-radius: 8px;

      font-size: 16px;
      font-weight: bold;

      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {
      background: #ff2a2a;
    }

  </style>
</head>

<body>

  <div class="form-container">

    <h1>Înregistrare</h1>

    <form>

      <!-- USERNAME -->

      <div>
        <label for="username">Username</label>

        <input
          type="text"
          id="username"
          name="username"

          required

          minlength="5"

          pattern="[a-z0-9]{5,}"

          placeholder="doar litere mici și cifre"
        >
      </div>

      <!-- PASSWORD -->

      <div>
        <label for="password">Parolă</label>

        <input
          type="password"
          id="password"
          name="password"

          required

          pattern="(?=.*[A-Z])(?=.*[0-9])(?=.*[\W_]).{8,}"
        

          placeholder="Min 8 caractere"
        >
        <!-- 8 simbole minimum; 1 litera mare; 1 cifra; 1 simbol special -->
      </div>

      <!-- DATE -->

      <div>
        <label for="date">Data Rezervării</label>

        <input
          type="date"
          id="date"
          name="date"

          min="2026-05-01"
          max="2026-05-31"

          required
        >
      </div>

      <!-- COLOR -->

      <div>
        <label for="theme">Culoare Temă</label>

        <input
          type="color"
          id="theme"
          name="theme"

          value="#1d1d1d"
        >
      </div>

      <button type="submit">
        Înregistrare
      </button>

    </form>

  </div>

  <script>

    const colorPicker =
      document.getElementById("theme");

    const formContainer =
      document.querySelector(".form-container");

    colorPicker.addEventListener("input", () => {

      document.documentElement.style.setProperty(
        "--theme-color",
        colorPicker.value
      );

    });

  </script>

</body>
</html>
